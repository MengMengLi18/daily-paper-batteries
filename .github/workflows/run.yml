name: arXiv-daily

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        uv pip install requests

    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")
        echo "开始抓取 $today 的 arXiv 论文..."
        if [ -f "data/${today}.jsonl" ]; then
            rm "data/${today}.jsonl"
        fi
        mkdir -p data
        python daily_arxiv/arxiv_fetch.py --output data/${today}.jsonl
        if [ $? -ne 0 ]; then
            echo "抓取失败或今日无新论文"
            exit 1
        fi
        echo "crawl_date=$today" >> $GITHUB_OUTPUT
        echo "抓取完成"

    - name: Convert to Markdown
      if: steps.crawl_step.outcome == 'success'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        cd to_md
        python convert.py --data "../data/${today}.jsonl"
        echo "Markdown转换完成"

    - name: Update file list
      if: steps.crawl_step.outcome == 'success'
      run: |
        mkdir -p assets
        ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt

    - name: Commit code changes to main branch
      if: steps.crawl_step.outcome == 'success'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        git add .github/ -A
        git reset -- data/* assets/file-list.txt 2>/dev/null || true
        if ! git diff --staged --quiet; then
          git commit -m "chore: update config"
        fi

    - name: Push code changes to main branch
      if: steps.crawl_step.outcome == 'success'
      run: |
        git config pull.rebase true
        git config rebase.autoStash true
        for i in {1..3}; do
          if git push origin main; then break
          else
            git pull origin main --no-edit || true
            [ $i -eq 3 ] && exit 1
          fi
        done

    - name: Prepare data files for data branch
      if: steps.crawl_step.outcome == 'success'
      run: |
        mkdir -p /tmp/data_files/data /tmp/data_files/assets
        cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
        cp assets/file-list.txt /tmp/data_files/assets/ 2>/dev/null || true

    - name: Setup and commit to data branch
      if: steps.crawl_step.outcome == 'success'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        today=${{ steps.crawl_step.outputs.crawl_date }}
        rm -rf data/*.jsonl data/*.md assets/file-list.txt 2>/dev/null || true
        if git ls-remote --heads origin data | grep -q data; then
          git fetch origin data:data && git checkout data && git pull origin data || true
        else
          git checkout --orphan data
          git rm -rf --cached . 2>/dev/null || true
          mkdir -p data assets
          echo "# Data Branch" > README.md
          git add README.md && git commit -m "chore: initialize data branch"
          git push origin data
        fi
        mkdir -p data assets
        cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
        cp /tmp/data_files/assets/file-list.txt assets/ 2>/dev/null || true
        git add data/* assets/file-list.txt 2>/dev/null || true
        if ! git diff --staged --quiet; then
          git commit -m "update: $today arXiv papers"
        fi

    - name: Push data changes to data branch
      if: steps.crawl_step.outcome == 'success'
      run: |
        git config pull.rebase true && git config rebase.autoStash true
        for i in {1..3}; do
          if git push origin data; then break
          else
            git pull origin data --no-edit || true
            [ $i -eq 3 ] && exit 1
          fi
        done

    - name: Summary
      run: |
        echo "工作流完成"
